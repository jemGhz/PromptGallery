<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Atölyesi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0A09;
    --surface:#141412;
    --line:#242320;
    --ink:#EDEAE3;
    --ink-dim:#8A867C;
    --gold:#C7A15E;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }

  header{
    padding:56px 32px 40px;
    max-width:1280px;
    margin:0 auto;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:16px;
    border-bottom:1px solid var(--line);
  }
  .mark{
    font-family:'Fraunces', serif;
    font-size:22px;
    font-weight:500;
    letter-spacing:-0.01em;
  }
  .mark span{color:var(--gold); font-style:italic; font-weight:400;}
  .meta{
    font-size:12.5px;
    color:var(--ink-dim);
    display:flex;
    align-items:center;
    gap:14px;
  }
  .refresh{
    background:none;
    border:none;
    color:var(--ink-dim);
    font-size:12.5px;
    cursor:pointer;
    font-family:'Inter', sans-serif;
    transition:color 0.15s ease;
  }
  .refresh:hover{color:var(--gold);}

  .status{
    max-width:1280px;
    margin:20px auto 0;
    padding:0 32px;
    font-size:13px;
    color:var(--ink-dim);
    display:none;
  }
  .status.show{display:block;}
  .status.error{color:#C77B62;}

  /* Filter bars */
  .filters{
    max-width:1280px;
    margin:0 auto;
    padding:24px 32px 0;
  }
  .filter-block{margin-bottom:18px;}
  .filter-label{
    display:block;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--ink-dim);
    margin-bottom:10px;
  }
  .filter-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .chip{
    font-family:'Inter', sans-serif;
    font-size:12px;
    padding:7px 14px;
    border-radius:20px;
    border:1px solid var(--line);
    background:transparent;
    color:var(--ink-dim);
    cursor:pointer;
    transition:all 0.15s ease;
    white-space:nowrap;
  }
  .chip:hover{border-color:var(--ink-dim); color:var(--ink);}
  .chip.active{background:var(--gold); border-color:var(--gold); color:#0A0A09;}

  .masonry{
    max-width:1280px;
    margin:0 auto;
    padding:32px;
    columns:5 240px;
    column-gap:14px;
  }
  @media (max-width:1000px){ .masonry{columns:3 200px;} }
  @media (max-width:640px){ .masonry{columns:2 160px; padding:16px; gap:10px;} }

  .tile{
    break-inside:avoid;
    margin-bottom:14px;
    border-radius:6px;
    overflow:hidden;
    cursor:pointer;
    position:relative;
    background:var(--surface);
  }
  .tile img{
    width:100%;
    display:block;
    transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);
  }
  .tile:hover img{transform:scale(1.03);}
  .tile-hint{
    position:absolute;
    inset:0;
    background:linear-gradient(to top, rgba(10,10,9,0.75) 0%, transparent 55%);
    opacity:0;
    transition:opacity 0.2s ease;
    display:flex;
    align-items:flex-end;
    padding:12px;
  }
  .tile:hover .tile-hint{opacity:1;}
  .tile-hint span{
    font-size:11px;
    color:var(--ink);
    letter-spacing:0.02em;
  }

  .empty{
    text-align:center;
    padding:120px 20px;
    color:var(--ink-dim);
    font-size:14px;
  }

  /* Modal */
  .modal-backdrop{
    position:fixed;
    inset:0;
    background:rgba(6,6,5,0.92);
    display:none;
    align-items:center;
    justify-content:center;
    padding:32px;
    z-index:100;
  }
  .modal-backdrop.open{display:flex;}
  .modal{
    max-width:960px;
    width:100%;
    max-height:88vh;
    display:flex;
    background:var(--surface);
    border-radius:10px;
    overflow:hidden;
  }
  @media (max-width:760px){ .modal{flex-direction:column; overflow-y:auto; max-height:92vh;} }

  .modal-img-wrap{
    flex:1 1 55%;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .modal-img-wrap img{
    width:100%;
    height:100%;
    max-height:88vh;
    object-fit:contain;
  }
  .modal-body{
    flex:1 1 45%;
    padding:40px;
    display:flex;
    flex-direction:column;
  }
  .modal-eyebrow{
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--ink-dim);
    margin-bottom:20px;
  }
  .modal-tags{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:28px;
  }
  .tag{
    font-size:11px;
    padding:5px 11px;
    border-radius:20px;
    border:1px solid var(--line);
    color:var(--ink-dim);
  }
  .tag.person{color:var(--gold); border-color:rgba(199,161,94,0.4);}
  .modal-prompt{
    font-size:14px;
    line-height:1.7;
    color:var(--ink);
    flex:1;
    margin-bottom:28px;
    max-height:280px;
    overflow-y:auto;
    padding-right:6px;
  }
  .modal-prompt::-webkit-scrollbar{width:3px;}
  .modal-prompt::-webkit-scrollbar-thumb{background:var(--line);}
  .modal-actions{display:flex; gap:10px;}
  .btn{
    flex:1;
    padding:14px;
    border-radius:7px;
    font-family:'Inter', sans-serif;
    font-weight:500;
    font-size:13.5px;
    cursor:pointer;
    border:1px solid var(--line);
    background:transparent;
    color:var(--ink);
    transition:all 0.15s ease;
  }
  .btn.primary{background:var(--gold); border-color:var(--gold); color:#0A0A09;}
  .btn.primary:hover{opacity:0.85;}
  .btn.primary.copied{background:var(--ink); border-color:var(--ink);}
  .btn:not(.primary):hover{border-color:var(--ink-dim);}
</style>
</head>
<body>
<header>
  <div class="mark">JG <span>Prompt Archive</span></div>
  <div class="meta">
    <span id="countLabel"></span>
    <button class="refresh" onclick="loadData()">↻ yenile</button>
  </div>
</header>

<div class="status" id="status"></div>

<div class="filters" id="filters"></div>

<div class="masonry" id="grid"></div>

<div class="modal-backdrop" id="modalBackdrop" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <div class="modal-img-wrap">
      <img id="modalImg" src="" alt="referans görsel">
    </div>
    <div class="modal-body">
      <div class="modal-eyebrow" id="modalDate"></div>
      <div class="modal-tags" id="modalTags"></div>
      <div class="modal-prompt" id="modalPrompt"></div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">← Geri</button>
        <button class="btn primary" id="copyBtn" onclick="copyPrompt()">Kopyala</button>
      </div>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1-n0pVWWzNKKodfB9TVXKC7hpQfJDPO_ZtzFE6gDqKBM';
const SHEET_NAME = 'Sayfa1';
const MAX_TOP_TAGS = 20;

let allRows = [];
let visibleRows = [];
let activeCategory = null;
let activeTag = null;

function setStatus(msg, isError){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status show' + (isError ? ' error' : '');
}
function clearStatus(){
  document.getElementById('status').className = 'status';
}
function escapeAttr(s){
  return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}
function escapeHtml(s){
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

async function loadData(){
  setStatus('Yükleniyor...');
  document.getElementById('grid').innerHTML = '';
  document.getElementById('filters').innerHTML = '';

  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

  try{
    const res = await fetch(url);
    if(!res.ok) throw new Error('Sheet okunamadı.');
    const text = await res.text();
    const jsonStr = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
    const data = JSON.parse(jsonStr);

    const rows = data.table.rows.map(r => {
      const cells = r.c.map(c => c ? (c.v ?? '') : '');
      return {
        tarih: cells[0] || '',
        etiketler: cells[1] || '',
        promptText: cells[2] || '',
        gorselLink: cells[3] || '',
        chatId: cells[4] || '',
        kategori: (cells[5] || '').trim()
      };
    }).filter(r => r.promptText);

    allRows = rows.reverse();
    activeCategory = null;
    activeTag = null;
    clearStatus();
    document.getElementById('countLabel').textContent = allRows.length + ' kayıt';

    if(allRows.length === 0){
      document.getElementById('grid').innerHTML = '<div class="empty">Henüz kayıt yok. Bota bir görsel gönder, buraya düşer.</div>';
      return;
    }
    renderFilters();
    applyFiltersAndRender();
  }catch(err){
    setStatus('Hata: ' + err.message, true);
  }
}

function getCategories(){
  return [...new Set(allRows.map(r => r.kategori).filter(Boolean))].sort();
}

function getTopTags(){
  const freq = {};
  allRows.forEach(r => {
    r.etiketler.split(',').map(t => t.trim()).filter(Boolean).forEach(t => {
      freq[t] = (freq[t] || 0) + 1;
    });
  });
  return Object.entries(freq)
    .sort((a, b) => b[1] - a[1])
    .slice(0, MAX_TOP_TAGS)
    .map(e => e[0]);
}

function renderFilters(){
  const categories = getCategories();
  const topTags = getTopTags();
  const container = document.getElementById('filters');

  let html = '';

  if(categories.length){
    html += `
      <div class="filter-block">
        <span class="filter-label">Kategoriler</span>
        <div class="filter-row">
          <button class="chip ${!activeCategory ? 'active' : ''}" onclick="setCategory(null)">Tümü</button>
          ${categories.map(c => `<button class="chip ${activeCategory === c ? 'active' : ''}" onclick="setCategory('${escapeAttr(c)}')">${escapeHtml(c)}</button>`).join('')}
        </div>
      </div>`;
  }

  if(topTags.length){
    html += `
      <div class="filter-block">
        <span class="filter-label">Popüler Etiketler</span>
        <div class="filter-row">
          ${topTags.map(t => `<button class="chip ${activeTag === t ? 'active' : ''}" onclick="setTag('${escapeAttr(t)}')">${escapeHtml(t)}</button>`).join('')}
        </div>
      </div>`;
  }

  container.innerHTML = html;
}

function setCategory(c){
  activeCategory = c;
  renderFilters();
  applyFiltersAndRender();
}

function setTag(t){
  activeTag = (activeTag === t) ? null : t;
  renderFilters();
  applyFiltersAndRender();
}

function applyFiltersAndRender(){
  visibleRows = allRows.filter(r => {
    const matchesCategory = !activeCategory || r.kategori === activeCategory;
    const tags = r.etiketler.split(',').map(t => t.trim());
    const matchesTag = !activeTag || tags.includes(activeTag);
    return matchesCategory && matchesTag;
  });
  renderGrid();
}

function renderGrid(){
  const grid = document.getElementById('grid');

  if(visibleRows.length === 0){
    grid.innerHTML = '<div class="empty">Bu filtrelere uyan kayıt yok.</div>';
    return;
  }

  grid.innerHTML = visibleRows.map((r, i) => {
    const tags = r.etiketler.split(',').map(t => t.trim()).filter(Boolean);
    const firstTag = tags[0] || '';
    const imgSrc = r.gorselLink || '';
    return `
      <div class="tile" onclick="openModal(${i})">
        <img src="${imgSrc}" alt="referans görsel" loading="lazy" onerror="this.closest('.tile').style.display='none'">
        <div class="tile-hint"><span>${escapeHtml(firstTag)}</span></div>
      </div>
    `;
  }).join('');
}

function openModal(idx){
  const r = visibleRows[idx];
  const tags = r.etiketler.split(',').map(t => t.trim()).filter(Boolean);

  document.getElementById('modalImg').src = r.gorselLink || '';
  document.getElementById('modalPrompt').textContent = r.promptText;
  document.getElementById('modalDate').textContent = r.tarih
    ? new Date(r.tarih).toLocaleDateString('tr-TR', {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'})
    : '';

  let tagsHtml = tags.map(t => {
    const isPerson = t.includes('model');
    return `<span class="tag${isPerson ? ' person' : ''}">${escapeHtml(t)}</span>`;
  }).join('');
  if(r.kategori){
    tagsHtml = `<span class="tag person">${escapeHtml(r.kategori)}</span>` + tagsHtml;
  }
  document.getElementById('modalTags').innerHTML = tagsHtml;

  const copyBtn = document.getElementById('copyBtn');
  copyBtn.textContent = 'Kopyala';
  copyBtn.classList.remove('copied');
  copyBtn.dataset.prompt = r.promptText;

  document.getElementById('modalBackdrop').classList.add('open');
}

function closeModal(){
  document.getElementById('modalBackdrop').classList.remove('open');
}

function copyPrompt(){
  const btn = document.getElementById('copyBtn');
  navigator.clipboard.writeText(btn.dataset.prompt).then(() => {
    btn.textContent = 'Kopyalandı ✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Kopyala';
      btn.classList.remove('copied');
    }, 1600);
  });
}

document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeModal(); });

loadData();
</script>
</body>
</html>
